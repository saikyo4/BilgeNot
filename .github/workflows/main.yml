name: BilgeNot_CI_Pipeline

on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pytest httpx firebase-admin python-multipart

    - name: Run Unit Tests
      run: |
        python -m pytest backend/tests/test_ocr.py